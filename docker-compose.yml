version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: gps-postgres
    restart: always
    ports: [ "5432:5432" ]
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./database/migration_v5.sql:/docker-entrypoint-initdb.d/02-migration_v5.sql
      - ./database/migration_v6.sql:/docker-entrypoint-initdb.d/03-migration_v6.sql
      - ./database/migration_v7.sql:/docker-entrypoint-initdb.d/04-migration_v7.sql
      - ./database/migration_v8_geofencing.sql:/docker-entrypoint-initdb.d/05-migration_v8_geofencing.sql
      - postgres_data:/var/lib/postgresql/data
    networks: [ tracking-net ]
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 60s

  redis:
    image: redis:7-alpine
    container_name: gps-redis
    restart: always
    ports: [ "6379:6379" ]
    networks: [ tracking-net ]
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    container_name: gps-api
    restart: always
    ports: [ "3000:3000" ]
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - REDIS_HOST=redis
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [ tracking-net ]
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/health" ]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 60s

  worker:
    build: ./worker
    container_name: gps-worker
    restart: always
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - REDIS_HOST=redis
      - OSRM_URL=http://osrm:5000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [ tracking-net ]
    healthcheck:
      test: [ "CMD", "node", "-e", "process.exit(0)" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  osrm:
    image: osrm/osrm-backend
    container_name: gps-osrm
    restart: always
    volumes:
      - ./osrm_data:/data
    command: osrm-routed --algorithm mld /data/peru-260321.osrm
    ports:
      - "5000:5000"
    networks: [ tracking-net ]

  admin-panel:
    build: ./admin-panel
    container_name: gps-admin
    restart: always
    ports: [ "80:80" ]
    depends_on:
      api:
        condition: service_healthy
    networks: [ tracking-net ]

networks:
  tracking-net:
    driver: bridge

volumes:
  postgres_data:
