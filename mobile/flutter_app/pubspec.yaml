name: flutter_gps_tracker
description: Progressive GPS Tracking for Field Sales
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  geolocator: ^10.1.0
  flutter_background_service: ^5.0.3
  flutter_background_service_android: ^6.3.1
  flutter_secure_storage: ^9.0.0
  dio: ^5.3.3
  intl: ^0.18.1
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  provider: ^6.1.1
  device_info_plus: ^9.0.3
  shared_preferences: ^2.2.2
  permission_handler: ^11.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
