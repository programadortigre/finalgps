name: flutter_gps_tracker
description: Progressive GPS Tracking for Field Sales
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  geolocator: ^14.0.2
  flutter_background_service: ^5.0.3
  flutter_background_service_android: ^6.3.1
  flutter_secure_storage: ^10.0.0
  dio: ^5.3.3
  intl: ^0.20.2
  flutter_map: ^8.2.2
  latlong2: ^0.9.0
  provider: ^6.1.1
  device_info_plus: ^12.3.0
  shared_preferences: ^2.2.2
  permission_handler: ^12.0.1
  sqflite: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.1.2
  flutter_launcher_icons: ^0.14.4
  socket_io_client: ^3.0.0
  url_launcher: ^6.2.0
  sensors_plus: ^7.0.0
  flutter_activity_recognition: ^4.0.0
  battery_plus: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/app_icon.png

flutter_launcher_icons:
  image_path: "assets/images/app_icon.png"
  android: true
  ios: false
  min_sdk_android: 21
